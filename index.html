<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">

<title>Percent Calculator</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:sans-serif;
    background:#111827;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
    transition:.25s;
}

.card{
    width:100%;
    max-width:420px;
    background:#1f2937;
    border-radius:24px;
    padding:24px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    transition:.25s;
}

.header{
    position:relative;
}

h1{
    margin:0 0 20px;
    text-align:center;
    font-size:28px;
}

.theme-toggle{
    position:absolute;
    top:0;
    right:0;
    width:42px;
    height:42px;
    border:none;
    border-radius:12px;
    background:#374151;
    color:white;
    font-size:18px;
    cursor:pointer;

    display:flex;
    align-items:center;
    justify-content:center;
    line-height:1;
    padding:0;
}

.input-box{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    color:#9ca3af;
}

input[type="number"]{
    width:100%;
    padding:16px;
    border:1px solid transparent;
    border-radius:16px;
    font-size:28px;
    background:#374151;
    color:white;
    outline:none;
}

.options{
    display:flex;
    gap:10px;
    margin-bottom:24px;
}

.options label{
    flex:1;
}

.options input{
    display:none;
}

.percent-btn{
    display:block;
    text-align:center;
    padding:14px;
    border-radius:14px;
    background:#374151;
    font-size:20px;
    cursor:pointer;
    transition:.2s;
}

.options input:checked + .percent-btn{
    background:#3b82f6;
    font-weight:bold;
}

.result{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.result-box{
    background:#111827;
    border:1px solid transparent;
    border-radius:18px;
    padding:18px;
    transition:.25s;
}

.result-title{
    color:#9ca3af;
    font-size:14px;
    margin-bottom:8px;
}

.result-value100{
    font-size:34px;
    font-weight:bold;
    color:#6366f1;
}

.result-value60{
    font-size:34px;
    font-weight:bold;
    color:#22c55e;
}

.result-value40{
    font-size:34px;
    font-weight:bold;
    color:#ef4444;
}

.footer{
    text-align:center;
    margin-top:18px;
    color:#6b7280;
    font-size:13px;
}

/* ===== LIGHT THEME ===== */

body.light-theme{
    background:#f3f4f6;
    color:#111827;
}

body.light-theme .card{
    background:#ffffff;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
}

body.light-theme label{
    color:#6b7280;
}

body.light-theme input[type="number"]{
    background:#ffffff;
    color:#111827;
    border-color:#d1d5db;
}

body.light-theme .percent-btn{
    background:#e5e7eb;
    color:#111827;
}

body.light-theme .options input:checked + .percent-btn{
    background:#2563eb;
    color:white;
}

body.light-theme .result-box{
    background:#f9fafb;
    border-color:#e5e7eb;
}

body.light-theme .theme-toggle{
    background:#e5e7eb;
    color:#111827;
}
</style>
</head>

<body>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("sw.js");
  });
}
</script>

<div class="card">

    <div class="header">
        <h1>คิดให้ 60/40</h1>
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌓</button>
    </div>

    <div class="input-box">
        <label>กรอกตัวเลข</label>
        <input type="number" id="num" placeholder="เช่น 30" oninput="calc()">
    </div>

    <div class="options">

        <label>
            <input type="radio" name="p" value="100" checked onchange="calc()">
            <div class="percent-btn">100%</div>
        </label>

        <label>
            <input type="radio" name="p" value="60" onchange="calc()">
            <div class="percent-btn">60%</div>
        </label>

        <label>
            <input type="radio" name="p" value="40" onchange="calc()">
            <div class="percent-btn">40%</div>
        </label>

    </div>

    <div class="result">

        <div class="result-box">
            <div class="result-title">100%</div>
            <div class="result-value100" id="r100">0</div>
        </div>

        <div class="result-box">
            <div class="result-title">60%</div>
            <div class="result-value60" id="r60">0</div>
        </div>

        <div class="result-box">
            <div class="result-title">40%</div>
            <div class="result-value40" id="r40">0</div>
        </div>

    </div>

    <div class="footer">
        Copyright © TungNing
    </div>

</div>

<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js");
    });
}

function calc(){

    let num = parseFloat(document.getElementById("num").value);

    if(isNaN(num)){
        document.getElementById("r100").innerText = "0";
        document.getElementById("r60").innerText = "0";
        document.getElementById("r40").innerText = "0";
        return;
    }

    let p = document.querySelector('input[name="p"]:checked').value;

    let full = num / (p / 100);

    document.getElementById("r100").innerText = full.toFixed(2);
    document.getElementById("r60").innerText = (full * 0.6).toFixed(2);
    document.getElementById("r40").innerText = (full * 0.4).toFixed(2);
}

function toggleTheme(){

    document.body.classList.toggle("light-theme");

    if(document.body.classList.contains("light-theme")){
        localStorage.setItem("theme","light");
        document.querySelector('meta[name="theme-color"]').content = "#ffffff";
    }else{
        localStorage.setItem("theme","dark");
        document.querySelector('meta[name="theme-color"]').content = "#111827";
    }
}

window.addEventListener("load",()=>{

    const theme = localStorage.getItem("theme");

    if(theme === "light"){
        document.body.classList.add("light-theme");
        document.querySelector('meta[name="theme-color"]').content = "#ffffff";
    }
});
</script>

</body>
</html>
