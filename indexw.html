<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เครื่องคำนวณสัดส่วนเปอร์เซ็นต์</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input[type="number"]:focus {
            border-color: #007bff;
            outline: none;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #007bff;
            background-color: #fff;
            color: #007bff;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn.active {
            background-color: #007bff;
            color: #fff;
        }
        .btn:hover {
            background-color: #0056b3;
            color: #fff;
            border-color: #0056b3;
        }
        .result-box {
            background-color: #f8f9fa;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 16px;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .result-val {
            font-weight: bold;
            color: #28a745;
        }
		.result-val100 {
            font-weight: bold;
            color: #2c2099;
        }
		.result-val60 {
            font-weight: bold;
            color: #28a745;
        }
		.result-val40 {
            font-weight: bold;
            color: #d6150b;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>เครื่องคำนวณสัดส่วน</h2>
    
    <div class="form-group">
        <label for="inputNumber">กรอกตัวเลข:</label>
        <input type="number" id="inputNumber" placeholder="ใส่ตัวเลขที่นี่..." oninput="calculate()">
    </div>
    
    <label>ตัวเลขนี้คือค่าของ:</label>
    <div class="btn-group">
        <button class="btn active" onclick="setMode(100, this)">100%</button>
        <button class="btn" onclick="setMode(60, this)">60%</button>
        <button class="btn" onclick="setMode(40, this)">40%</button>
    </div>
    
    <div class="result-box">
        <div class="result-item">
            <span>ค่าของ 100%:</span>
            <span class="result-val100" id="res100">0.00</span>
        </div>
        <div class="result-item">
            <span>ค่าของ 60%:</span>
            <span class="result-val60" id="res60">0.00</span>
        </div>
        <div class="result-item">
            <span>ค่าของ 40%:</span>
            <span class="result-val40" id="res40">0.00</span>
        </div>
    </div>
</div>

<script>
    // กำหนดโหมดเริ่มต้นเป็น 100% (หมายความว่าตัวเลขที่กรอกตอนแรกคือค่า 100%)
    let currentMode = 100; 

    // ฟังก์ชันเปลี่ยนโหมดเมื่อกดปุ่ม
    function setMode(mode, element) {
        currentMode = mode;
        
        // เปลี่ยนสีปุ่มไฮไลท์
        let buttons = document.querySelectorAll('.btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
        
        // คำนวณใหม่ทันทีที่เปลี่ยนโหมด
        calculate();
    }

    // ฟังก์ชันคำนวณหลัก
    function calculate() {
        let inputVal = parseFloat(document.getElementById('inputNumber').value);
        
        // ถ้าช่องกรอกว่างหรือไม่ใช่ตัวเลข ให้แสดงเป็น 0.00 ทั้งหมด
        if (isNaN(inputVal)) {
            document.getElementById('res100').innerText = "0.00";
            document.getElementById('res60').innerText = "0.00";
            document.getElementById('res40').innerText = "0.00";
            return;
        }

        let val100, val60, val40;

        // คำนวณหาค่า 100% เป็นหลักก่อน แล้วค่อยกระจายไปหา 60% และ 40%
        if (currentMode === 100) {
            val100 = inputVal;
            val60 = (inputVal * 60) / 100;
            val40 = (inputVal * 40) / 100;
        } else if (currentMode === 60) {
            val100 = (inputVal * 100) / 60;
            val60 = inputVal;
            val40 = (val100 * 40) / 100;
        } else if (currentMode === 40) {
            val100 = (inputVal * 100) / 40;
            val60 = (val100 * 60) / 100;
            val40 = inputVal;
        }

        // แสดงผลลัพธ์แบบทศนิยม 2 ตำแหน่ง
        document.getElementById('res100').innerText = val100.toFixed(2);
        document.getElementById('res60').innerText = val60.toFixed(2);
        document.getElementById('res40').innerText = val40.toFixed(2);
    }
</script>

</body>
</html>
